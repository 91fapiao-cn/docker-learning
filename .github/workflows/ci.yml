name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Test Python app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements-dev.txt

      - name: Install test dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -q

  docker-build-and-smoke-test:
    name: Docker build and smoke test
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image with cache
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: docker-learning:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container
        run: |
          docker run -d --name docker-learning-ci -p 18080:8000 docker-learning:ci
          sleep 3

      - name: Smoke test root
        run: curl -fsS http://127.0.0.1:18080/

      - name: Smoke test healthz
        run: curl -fsS http://127.0.0.1:18080/healthz

      - name: Capture container logs
        if: failure()
        run: docker logs docker-learning-ci > docker-learning-ci.log 2>&1 || true

      - name: Upload logs artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-learning-ci-logs
          path: docker-learning-ci.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Cleanup
        if: always()
        run: docker rm -f docker-learning-ci || true
